<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMBS Prompt Studio — Production Content Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="app-header">
    <div class="header-brand">
        <div class="brand-icon">H</div>
        <div class="brand-text">
            <span class="brand-name">HAMBS</span>
            <span class="brand-sub">PROMPT STUDIO</span>
        </div>
    </div>
    <div class="header-controls">
        <div class="mode-toggle" id="modeToggle">
            <button class="toggle-btn active" data-mode="ugc">UGC</button>
            <button class="toggle-btn" data-mode="ads">ADS</button>
        </div>
        <select class="category-select" id="categorySelect">
            <option value="FASHION">Fashion</option>
            <option value="SKINCARE">Skincare</option>
            <option value="MAKANAN">Makanan</option>
            <option value="MINUMAN">Minuman</option>
            <option value="ELEKTRONIK">Elektronik</option>
        </select>
        <button class="btn-generate" id="generateBtn">Generate</button>
    </div>
</header>

<!-- ========== MAIN LAYOUT ========== -->
<div class="app-layout">

    <!-- ===== INPUT PANEL ===== -->
    <section class="input-panel" id="inputPanel">

        <!-- API KEY -->
        <div class="card" id="apiKeyCard">
            <div class="card-title">API Key</div>
            <div class="api-row">
                <input type="password" id="apiKeyInput" class="input-field" placeholder="Google AI Studio API Key">
                <button class="btn-sm btn-accent" id="saveApiKeyBtn">Save</button>
            </div>
            <button class="btn-sm btn-outline full-w" id="testApiBtn">Test Connection</button>
            <div class="api-status" id="apiWarning">API Key not saved.</div>
            <div class="api-test-result" id="apiTestResult"></div>
        </div>

        <!-- CHARACTER -->
        <div class="card">
            <div class="card-title">Character</div>
            <div class="field-group">
                <label class="field-label">Persona</label>
                <input type="text" id="charPersona" class="input-field" placeholder="e.g. Gen-Z beauty enthusiast, 22 tahun">
            </div>
            <div class="field-row">
                <div class="field-group flex-1">
                    <label class="field-label">Style</label>
                    <select id="charStyle" class="input-field">
                        <option value="casual">Casual</option>
                        <option value="creator">Creator</option>
                        <option value="professional">Professional</option>
                    </select>
                </div>
                <div class="field-group flex-1">
                    <label class="field-label">Language</label>
                    <select id="charLang" class="input-field">
                        <option value="ID">Indonesia</option>
                        <option value="EN">English</option>
                    </select>
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Tone</label>
                <select id="charTone" class="input-field">
                    <option value="jaksel">Anak Jaksel (sih, dong, gue, lo)</option>
                    <option value="santai">Santai Biasa</option>
                    <option value="formal">Formal / Professional</option>
                    <option value="energetic">Energetic / Hype</option>
                </select>
            </div>
            <div class="field-group">
                <label class="field-label">Character Image (optional)</label>
                <div class="upload-box" id="charUpload">
                    <span class="upload-placeholder">+ Upload</span>
                </div>
            </div>
        </div>

        <!-- PRODUCTS -->
        <div class="card">
            <div class="card-title">Products <span class="badge">Role System</span></div>
            <div id="productList"></div>
            <button class="btn-sm btn-outline full-w" id="addProductBtn">+ Add Product</button>
            <div class="validation-msg" id="productValidation"></div>
        </div>

        <!-- CONTENT SETTINGS -->
        <div class="card">
            <div class="card-title">Content Settings</div>
            <div class="field-row">
                <div class="field-group flex-1">
                    <label class="field-label">Duration</label>
                    <select id="durationTarget" class="input-field">
                        <option value="15">15 seconds</option>
                        <option value="30" selected>30 seconds</option>
                        <option value="60">60 seconds</option>
                    </select>
                </div>
                <div class="field-group flex-1">
                    <label class="field-label">Style</label>
                    <select id="contentStyleSelect" class="input-field">
                        <option value="lifestyle">Lifestyle</option>
                        <option value="demo">Demo</option>
                        <option value="review">Review</option>
                    </select>
                </div>
            </div>
            <div class="field-row">
                <div class="field-group flex-1">
                    <label class="field-label">Platform (optional)</label>
                    <select id="platformSelect" class="input-field">
                        <option value="">Any</option>
                        <option value="tiktok">TikTok</option>
                        <option value="instagram">Instagram Reels</option>
                        <option value="youtube">YouTube Shorts</option>
                    </select>
                </div>
                <div class="field-group flex-1">
                    <label class="field-label">Video Model</label>
                    <select id="videoModelSelect" class="input-field">
                        <option value="veo">Veo 3.1</option>
                        <option value="seedance">Seedance 2.0</option>
                    </select>
                </div>
            </div>
        </div>

    </section>

    <!-- ===== OUTPUT PANEL ===== -->
    <section class="output-panel" id="outputPanel">

        <!-- EMPTY STATE -->
        <div class="output-empty" id="outputEmpty">
            <div class="empty-icon">🎬</div>
            <h2>Ready to Generate</h2>
            <p>Configure your character, products, and settings, then hit <strong>Generate</strong>.</p>
        </div>

        <!-- LOADING STATE -->
        <div class="output-loading hidden" id="outputLoading">
            <div class="loader-ring"></div>
            <h3 id="loadingTitle">Generating...</h3>
            <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
            <div class="loading-status" id="loadingStatus">Starting...</div>
        </div>

        <!-- RESULTS -->
        <div class="output-results hidden" id="outputResults">
            <div class="results-header">
                <h2>Scene Output</h2>
                <button class="btn-sm btn-accent" id="copyAllBtn">Copy All Scenes</button>
            </div>
            <div id="sceneContainer"></div>
        </div>

    </section>
</div>

<!-- SESSION BADGE -->
<div class="session-badge" id="sessionBadge">
    <span class="dot"></span>
    <span>Session saved</span>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
